name: Compilar APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar Java (requerido por Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Instalar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Instalar dependencias
        run: npm install

      - name: Sincronizar proyecto Android (Capacitor)
        run: npx cap sync android

      - name: Compilar APK (debug)
        run: |
          cd android
          gradle assembleDebug --stacktrace

      - name: Subir APK como artifact descargable
        uses: actions/upload-artifact@v4
        with:
          name: almacen-piroplast-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
