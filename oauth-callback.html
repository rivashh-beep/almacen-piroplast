<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Conectando con Dropbox...</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f4f8; }
    .card { background: white; border-radius: 12px; padding: 40px; max-width: 560px; width: 90%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .icono { font-size: 3rem; margin-bottom: 16px; }
    h2 { color: #1c2b33; margin-bottom: 8px; }
    p { color: #607d8b; margin-bottom: 20px; }
    .token-box { background: #f0f4f8; border: 1.5px solid #cfd8dc; border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.8rem; word-break: break-all; text-align: left; margin-top: 16px; }
    .label { font-size: 0.75rem; color: #607d8b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .btn { background: #1565c0; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 16px; }
    .error { color: #c0392b; background: #fff5f5; border: 1.5px solid #f5c6cb; border-radius: 8px; padding: 14px; }
  </style>
</head>
<body>
<div class="card">
  <div class="icono" id="icono">⏳</div>
  <h2 id="titulo">Conectando con Dropbox...</h2>
  <p id="subtitulo">Intercambiando código de autorización por refresh token permanente.</p>
  <div id="resultado"></div>
</div>

<script>
const APP_KEY    = 'sb83cb0ychf8nku';
const APP_SECRET = 's2mcnleajysavb2';
const REDIRECT_URI = 'https://rivashh-beep.github.io/almacen-piroplast/oauth-callback.html';

async function main() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    mostrarError('Dropbox rechazó la autorización: ' + error);
    return;
  }

  if (!code) {
    mostrarError('No se recibió ningún código de autorización.');
    return;
  }

  try {
    const body = new URLSearchParams({
      code: code,
      grant_type: 'authorization_code',
      client_id: APP_KEY,
      client_secret: APP_SECRET,
      redirect_uri: REDIRECT_URI
    });

    const response = await fetch('https://api.dropboxapi.com/oauth2/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body.toString()
    });

    const data = await response.json();

    if (data.refresh_token) {
      document.getElementById('icono').textContent = '✅';
      document.getElementById('titulo').textContent = '¡Refresh token obtenido!';
      document.getElementById('subtitulo').textContent = 'Copiá el refresh token de abajo y pegámelo en el chat de Claude.';
      document.getElementById('resultado').innerHTML = `
        <div class="label">REFRESH TOKEN PERMANENTE (no vence)</div>
        <div class="token-box" id="token-text">${data.refresh_token}</div>
        <button class="btn" onclick="copiar()">📋 Copiar token</button>
        <p style="margin-top:12px;font-size:0.85rem;color:#28a745;">También tenés un access token temporal: ${data.access_token ? data.access_token.substring(0,30) + '...' : 'N/A'}</p>
      `;
    } else {
      mostrarError('Error de Dropbox: ' + JSON.stringify(data));
    }
  } catch(e) {
    mostrarError('Error de red: ' + e.message);
  }
}

function mostrarError(msg) {
  document.getElementById('icono').textContent = '❌';
  document.getElementById('titulo').textContent = 'Error';
  document.getElementById('subtitulo').textContent = '';
  document.getElementById('resultado').innerHTML = `<div class="error">${msg}</div>`;
}

function copiar() {
  const texto = document.getElementById('token-text').textContent;
  navigator.clipboard.writeText(texto).then(() => alert('Token copiado al portapapeles'));
}

main();
</script>
</body>
</html>
